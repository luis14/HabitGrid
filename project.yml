name: HabitGrid

options:
  bundleIdPrefix: com.habitgrid
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  localizations:
    - en
    - es

configs:
  Debug: debug
  Release: release

targets:
  HabitGrid:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabitGrid
        createIntermediateGroups: true
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HabitGrid/Resources
    info:
      path: HabitGrid/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: HabitGrid
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        NSUserNotificationsUsageDescription: "HabitGrid uses notifications to remind you about your habits and medications."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: HabitGrid/HabitGrid.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.habitgrid.shared
    dependencies:
      - target: HabitGridWidget
        embed: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        DEVELOPMENT_LANGUAGE: en
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  HabitGridWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabitGridWidget
        createIntermediateGroups: true
      # Shared model + utility files (compiled into the widget's own module)
      - path: HabitGrid/Models/Habit.swift
      - path: HabitGrid/Models/HabitCompletion.swift
      - path: HabitGrid/Models/HabitSchedule.swift
      - path: HabitGrid/Models/Medication.swift
      - path: HabitGrid/Models/MedicationDose.swift
      - path: HabitGrid/Models/MedicationSchedule.swift
      - path: HabitGrid/Models/MoodEntry.swift
      - path: HabitGrid/Components/Color+Hex.swift
    info:
      path: HabitGridWidget/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HabitGridWidget/HabitGridWidget.entitlements
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: HabitGridWidget/HabitGridWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.habitgrid.HabitGrid.HabitGridWidget

  HabitGridTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HabitGridTests
    dependencies:
      - target: HabitGrid
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  HabitGridUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HabitGridUITests
    dependencies:
      - target: HabitGrid
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  HabitGrid:
    build:
      targets:
        HabitGrid: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HabitGridTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  HabitGridWidget:
    build:
      targets:
        HabitGridWidget: all
    run:
      config: Debug
      environmentVariables:
        _XCWidgetKind: HabitGridSmallWidget
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
