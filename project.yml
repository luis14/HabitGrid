name: HabitGrid

options:
  bundleIdPrefix: com.habitgrid
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  localizations:
    - en
    - es

configs:
  Debug: debug
  Release: release

targets:
  HabitGrid:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HabitGrid
        createIntermediateGroups: true
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HabitGrid/Resources
    info:
      path: HabitGrid/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: HabitGrid
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        NSUserNotificationsUsageDescription: "HabitGrid uses notifications to remind you about your habits."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        DEVELOPMENT_LANGUAGE: en
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  HabitGridTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HabitGridTests
    dependencies:
      - target: HabitGrid
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  HabitGridUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HabitGridUITests
    dependencies:
      - target: HabitGrid
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
